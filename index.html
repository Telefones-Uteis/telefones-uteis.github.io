<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telefones Úteis PRO++</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

    body {
      margin: 0;
      padding: 20px;
      background: #eef2f7;
      color: #222;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }

    h1 { text-align: center; color: #0f4c81; }
    .subtitle { text-align: center; color: #5b6b7b; margin-bottom: 22px; }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8d3df;
      border-radius: 8px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-add { background: #198754; color: #fff; }
    .btn-edit { background: #0d6efd; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-whats { background: #25d366; color: #fff; }
    .btn-call { background: #fd7e14; color: #fff; }

    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; }

    .acao-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
  </style>
</head>

<body>
  <div class="container">
    <h1>📞 Telefones Úteis</h1>
    <div class="subtitle">Central de contatos úteis — consulte, cadastre e acesse rapidamente.</div>

    <input id="busca" placeholder="Buscar..." oninput="renderizarTabela()" />

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Observações</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaContatos"></tbody>
    </table>
  </div>

<script>
const BIN_ID = "69cb0541856a682189e3aded";
const ACCESS_KEY = "$2a$10$JGOrwpp/ZdlRDguC9i6pm.V/tOGv7eil4J4dKWGt5y7DBJEa3HvOi";

let contatos = [];

function limparNumero(n){ return (n||"").replace(/\D/g,""); }

function abrirWhatsApp(t){
  const n = limparNumero(t);
  window.open(`https://wa.me/55${n}`, "_blank");
}

function ligarContato(t){
  window.location.href = `tel:${limparNumero(t)}`;
}

async function carregarContatos(){
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}?meta=false`,{
    headers:{ "X-Access-Key": ACCESS_KEY }
  });
  const d = await r.json();
  contatos = d.contatos || [];
  renderizarTabela();
}

function renderizarTabela(){
  const busca = document.getElementById("busca").value.toLowerCase();
  const tbody = document.getElementById("listaContatos");

  const filtrados = contatos.filter(c =>
    c.nome.toLowerCase().includes(busca) ||
    c.telefone.includes(busca) ||
    (c.observacoes||"").toLowerCase().includes(busca)
  );

  tbody.innerHTML = filtrados.map((c,i)=>`
    <tr>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.observacoes||""}</td>
      <td>
        <div class="acao-wrap">
          <button class="btn-whats" onclick="abrirWhatsApp('${c.telefone}')">WhatsApp</button>
          <button class="btn-call" onclick="ligarContato('${c.telefone}')">Ligar</button>
        </div>
      </td>
    </tr>
  `).join("");
}

carregarContatos();
</script>
</body>
</html>
